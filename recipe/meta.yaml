{% set name = "pygeoip" %}
{% set version = "0.3.2" %}
{% set compress_type = "tar.gz" %}
{% set hash_val = "f22c4e00ddf1213e0fae36dc60b46ee7c25a6339941ec1a975539014c1f9a96d" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.{{ compress_type }}
  sha256: {{ hash_val }}

build:
  number: 2
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --ignore-installed --no-cache-dir -vvv"

requirements:
  host:
    - python {{ python_min }}
    - pip

  run:
    - python >={{ python_min }}

test:
  requires:
    - python {{ python_min }}
  imports:
    - pygeoip

about:
  home: https://github.com/appliedsec/pygeoip
  license: LGPL 3.0
  license_file:  LICENSE.md
  license_family: LGPL
  summary: 'Pure Python GeoIP API'
  dev_url: https://github.com/appliedsec/pygeoip

extra:
  recipe-maintainers:
    - pmlandwehr
